apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: inroy11/feedback-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

        env:
        - name: DATABASE_URL
          value: postgresql://postgres:postgres@postgres-service:5432/feedback_db