version: "3.9"

services:
  backend:
    build: ./backend
    container_name: feedback-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env 
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: feedback-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedback_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    container_name: feedback-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: