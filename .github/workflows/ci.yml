name: CI Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/feedback-backend:latest ./backend

    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/feedback-frontend:latest ./frontend

    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/feedback-backend:latest

    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/feedback-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push          # waits for build to succeed first
    if: vars.DEPLOY_ENABLED == 'true'   # ← you control this like a switch
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f backend-deployment.yaml
        kubectl apply -f frontend-deployment.yaml